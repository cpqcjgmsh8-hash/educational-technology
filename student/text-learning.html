            { title: "教育技术学概述与定义", subtitle: "学习时长：约45分钟 | 难度：基础", navItems: ["教育技术定义", "核心概念", "相关原则"], content: `<div class="content-section"><h2 class="section-title">一、教育技术的定义</h2><div class="content-text"><p>教育技术（Educational Technology）是指运用各种理论及技术，通过对教与学过程及相关资源的设计，开发、利用、管理和评价，实现教育教学优化的理论与实践。</p><div class="highlight-box"><h4>💡 AECT定义</h4><p>美国教育传播与技术协会（AECT）将教育技术定义为："通过对适当技术过程和资源的管理来促进学习和提升绩效的研究与道德实践"。</p></div><p>理解教育技术的定义需要把握三个关键要素：</p><div class="key-point"><div class="key-point-icon">1</div><div class="key-point-content"><h4>研究（Study）</h4><p>教育技术是对学习过程和学习资源进行系统研究的学科领域。</p></div></div><div class="key-point"><div class="key-point-icon">2</div><div class="key-point-content"><h4>道德实践（Ethical Practice）</h4><p>强调在应用技术过程中遵循伦理规范，保护学习者权益。</p></div></div><div class="key-point"><div class="key-point-icon">3</div><div class="key-point-content"><h4>促进学习（Facilitating Learning）</h4><p>最终目标是提高教学效率、促进学习效果、实现教育目标。</p></div></div></div></div><div class="content-section"><h2 class="section-title">二、核心概念解析</h2><div class="content-text"><p>教育技术涉及多个核心概念：</p><div class="highlight-box"><h4>📖 态度（Attitude）</h4><p>指个人对某事物的心理倾向或思考方式，与参与特定活动的意愿密切相关。</p></div><div class="highlight-box"><h4>📖 能力（Competency）</h4><p>指使个人能够有效执行特定任务的相关知识、技能和态度的集合。</p></div><div class="highlight-box"><h4>📖 学习（Learning）</h4><p>指一个人或一群人信念、知识和能力的稳定持久变化。</p></div></div></div><div class="content-section"><h2 class="section-title">三、相关原则</h2><div class="content-text"><p>教育技术建立在几个基本原则之上：</p><div class="key-point"><div class="key-point-icon">✓</div><div class="key-point-content"><h4>做中学原则</h4><p>人们通过实践来学习。行为心理学和神经科学都支持这一观点。</p></div></div><div class="key-point"><div class="key-point-icon">✓</div><div class="key-point-content"><h4>时间投入原则</h4><p>一个人在学习任务上花费的时间越多，掌握该任务的可能性就越大。</p></div></div><div class="key-point"><div class="key-point-icon">✓</div><div class="key-point-content"><h4>及时反馈原则</h4><p>在学习者参与学习任务时提供及时和信息性的反馈有助于促进掌握。</p></div></div></div></div><div class="content-section" style="background: linear-gradient(135deg, var(--secondary-color), #2d4a6f); color: white;"><h2 class="section-title" style="color: white; border-bottom-color: rgba(255,255,255,0.2);">📚 学习小结</h2><div class="content-text" style="color: rgba(255,255,255,0.95);"><p>✅ 理解教育技术的基本定义和AECT定义</p><p>✅ 掌握教育技术的核心概念</p><p>✅ 了解教育技术的基本原则</p></div></div>` },

ion-title" style="color: white; border-bottom-color: rgba(255,255,255,0.2);">📚 学习小结</h2><div class="content-text" style="color: rgba(255,255,255,0.95);"><p>✅ 了解教育技术从古至今的发展历程</p><p>✅ 理解技术变革对教育的影响</p><p>✅ 认识技术发展的加速趋势</p></div></div>` },

>📊 学习分析师</h4><p>负责收集和分析学习数据，为教学改进提供依据。</p></div></div></div><div class="content-section" style="background: linear-gradient(135deg, var(--secondary-color), #2d4a6f); color: white;"><h2 class="section-title" style="color: white; border-bottom-color: rgba(255,255,255,0.2);">📚 学习小结</h2><div class="content-text" style="color: rgba(255,255,255,0.95);"><p>✅ 理解教育技术的范围和生命周期</p><p>✅ 了解教育技术的五个主要维度</p><p>✅ 认识教育技术领域的主要专业角色</p></div></div>` }

            { title: "学习理论概述", subtitle: "学习时长：约40分钟 | 难度：中等", navItems: ["学习理论", "行为主义", "认知主义"], content: `<div class="content-section"><h2 class="section-title">一、学习理论概述</h2><div class="content-text"><p>学习理论是教育技术的核心基础之一。理解不同学习理论有助于设计更有效的教学环境和学习活动。</p><div class="highlight-box"><h4>💡 学习的定义</h4><p>学习是指一个人或一群人信念、知识和能力的稳定持久变化。</p></div><p>主要的学习理论流派包括：</p><div class="key-point"><div class="key-point-icon">🐕</div><div class="key-point-content"><h4>行为主义</h4><p>关注可观察行为的变化，强调刺激-反应连接和强化。</p></div></div><div class="key-point"><div class="key-point-icon">🧠</div><div class="key-point-content"><h4>认知主义</h4><p>关注内部心理过程，强调信息加工、记忆和思维过程。</p></div></div><div class="key-point"><div class="key-point-icon">🏗️</div><div class="key-point-content"><h4>建构主义</h4><p>强调学习者主动建构知识，知识是个人经验的产物。</p></div></div></div></div><div class="content-section"><h2 class="section-title">二、行为主义学习理论</h2><div class="content-text"><p>行为主义起源于20世纪初，代表人物包括巴甫洛夫、华生和斯金纳。</p><div class="highlight-box"><h4>🔔 经典条件作用（巴甫洛夫）</h4><p>通过将中性刺激与无条件刺激配对，最终使中性刺激引起条件反应。</p></div><div class="highlight-box"><h4>🎯 操作条件作用（斯金纳）</h4><p>行为的后果（如强化或惩罚）影响该行为再次发生的可能性。</p></div></div></div><div class="content-section"><h2 class="section-title">三、认知主义学习理论</h2><div class="content-text"><p>认知主义在20世纪中叶兴起，强调学习的内部心理过程。</p><div class="highlight-box"><h4>📥 信息加工理论</h4><p>将人类思维比作计算机的信息加工系统，包括输入、编码、存储和检索过程。</p></div><div class="highlight-box"><h4>🔗 知识结构</h4><p>学习者通过形成概念网络和图式来组织知识。</p></div></div></div><div class="content-section" style="background: linear-gradient(135deg, var(--secondary-color), #2d4a6f); color: white;"><h2 class="section-title" style="color: white; border-bottom-color: rgba(255,255,255,0.2);">📚 学习小结</h2><div class="content-text" style="color: rgba(255,255,255,0.95);"><p>✅ 理解学习理论的重要性和基本定义</p><p>✅ 掌握行为主义学习理论的核心概念</p><p>✅ 了解认知主义学习理论的基本观点</p></div></div>` },
            { title: "行为主义与认知主义", subtitle: "学习时长：约40分钟 | 难度：中等", navItems: ["行为主义理论", "认知主义理论", "理论比较"], content: `<div class="content-section"><h2 class="section-title">一、行为主义深入分析</h2><div class="content-text"><p>行为主义理论对教育技术产生了深远影响，特别是在教学系统设计和媒体开发方面。</p><div class="highlight-box"><h4>🎯 斯金纳的操作条件作用</h4><p>强化分为正强化（添加愉快刺激）和负强化（移除厌恶刺激）。惩罚则包括正惩罚和负惩罚。</p></div><p><strong>程序教学的原则：</strong></p><div class="key-point"><div class="key-point-icon">1</div><div class="key-point-content"><h4>小步子原则</h4><p>学习材料被分解成小步骤，便于学习者逐步掌握。</p></div></div><div class="key-point"><div class="key-point-icon">2</div><div class="key-point-content"><h4>即时反馈原则</h4><p>学习者立即知道每个反应是否正确。</p></div></div><div class="key-point"><div class="key-point-icon">3</div><div class="key-point-content"><h4>自定步调原则</h4><p>学习者按自己的速度学习。</p></div></div></div></div><div class="content-section"><h2 class="section-title">二、认知主义深入分析</h2><div class="content-text"><p>认知主义强调学习的内部心理过程，关注知识如何在头脑中组织和表征。</p><div class="highlight-box"><h4>🧠 双重编码理论（Paivio）</h4><p>信息同时以语言和图像形式编码，增强记忆和检索。</p></div><div class="highlight-box"><h4>📦 工作记忆模型（Baddeley）</h4><p>工作记忆包括中央执行系统、语音循环、视觉空间画板和情景缓冲区。</p></div></div></div><div class="content-section"><h2 class="section-title">三、两种理论的比较</h2><div class="content-text"><p>行为主义和认知主义各有优势，现代教育技术倾向于整合两者的优点。</p><table style="width:100%;border-collapse:collapse;"><tr style="background:var(--secondary-color);color:white;"><th style="padding:0.75rem;text-align:left;">方面</th><th style="padding:0.75rem;text-align:left;">行为主义</th><th style="padding:0.75rem;text-align:left;">认知主义</th></tr><tr><td style="padding:0.75rem;">关注点</td><td style="padding:0.75rem;">可观察行为</td><td style="padding:0.75rem;">内部心理过程</td></tr><tr style="background:var(--hover-bg);"><td style="padding:0.75rem;">学习观</td><td style="padding:0.75rem;">刺激-反应联结</td><td style="padding:0.75rem;">信息加工和建构</td></tr></table></div></div><div class="content-section" style="background: linear-gradient(135deg, var(--secondary-color), #2d4a6f); color: white;"><h2 class="section-title" style="color: white; border-bottom-color: rgba(255,255,255,0.2);">📚 学习小结</h2><div class="content-text" style="color: rgba(255,255,255,0.95);"><p>✅ 深入理解行为主义和认知主义理论</p><p>✅ 能够比较两种理论的特点和应用</p><p>✅ 理解理论整合的重要性</p></div></div>` },
            { title: "建构主义与技术增强学习", subtitle: "学习时长：约40分钟 | 难度：较高", navItems: ["建构主义", "情境学习", "技术增强"], content: `<div class="content-section"><h2 class="section-title">一、建构主义学习理论</h2><div class="content-text"><p>建构主义认为知识不是被动接受的，而是学习者主动从经验中建构的。</p><div class="highlight-box"><h4>🏗️ 建构主义核心观点</h4><p>学习者在已有知识经验的基础上，通过与环境的互动，主动建构新的知识结构。</p></div><p><strong>建构主义的主要流派：</strong></p><div class="key-point"><div class="key-point-icon">👤</div><div class="key-point-content"><h4>个人建构主义</h4><p>强调个体如何从自己的经验中建构知识。</p></div></div><div class="key-point"><div class="key-point-icon">👥</div><div class="key-point-content"><h4>社会建构主义</h4><p>强调社会互动和文化背景在知识建构中的作用。</p></div></div></div></div><div class="content-section"><h2 class="section-title">二、情境学习与认知</h2><div class="content-text"><p>情境学习理论强调知识的情境性和应用性。</p><div class="highlight-box"><h4>🌍 情境学习的特点</h4><p>学习是在特定情境中发生的，知识紧密依赖于其被习得和使用的情境。</p></div><p><strong>情境学习的原则：</strong></p><p>1. 在真实情境中学习知识和技能</p><p>2. 通过学徒制和观察专家工作来学习</p><p>3. 强调社会互动和协作</p><p>4. 重视反思在学习中的作用</p></div></div><div class="content-section"><h2 class="section-title">三、技术增强学习</h2><div class="content-text"><p>技术为建构主义和情境学习提供了强大的支持工具。</p><div class="key-point"><div class="key-point-icon">🎮</div><div class="key-point-content"><h4>虚拟现实与增强现实</h4><p>提供沉浸式学习环境，支持情境化学习体验。</p></div></div><div class="key-point"><div class="key-point-icon">🤝</div><div class="key-point-content"><h4>协作学习技术</h4><p>支持异步和同步协作，促进社会建构。</p></div></div><div class="key-point"><div class="key-point-icon">📱</div><div class="key-point-content"><h4>移动学习</h4><p>使学习可以在真实情境中进行，实现无缝学习。</p></div></div></div></div><div class="content-section" style="background: linear-gradient(135deg, var(--secondary-color), #2d4a6f); color: white;"><h2 class="section-title" style="color: white; border-bottom-color: rgba(255,255,255,0.2);">📚 学习小结</h2><div class="content-text" style="color: rgba(255,255,255,0.95);"><p>✅ 理解建构主义学习理论的核心观点</p><p>✅ 了解情境学习理论及其应用</p><p>✅ 掌握技术增强学习的实现方式</p></div></div>` }
        ]},
        3: { title: "学习目标、教学法与技术的关联", pages: [
            { title: "学习目标类型与教学策略", subtitle: "学习时长：约40分钟 | 难度：中等", navItems: ["目标分类", "教学策略", "联结方式"], content: `<div class="content-section"><h2 class="section-title">一、学习目标的类型</h2><div class="content-text"><p>学习目标是教学设计的核心，它决定了教学内容和教学方法的选择。</p><div class="highlight-box"><h4>📋 布鲁姆分类学（修订版）</h4><p>将认知领域的学习目标分为六个层次：记忆、理解、应用、分析、评价和创造。</p></div><p><strong>各层次目标说明：</strong></p><div class="key-point"><div class="key-point-icon">1</div><div class="key-point-content"><h4>记忆（Remember）</h4><p>识别和回忆事实、概念和程序。</p></div></div><div class="key-point"><div class="key-point-icon">2</div><div class="key-point-content"><h4>理解（Understand）</h4><p>解释含义，构建意义，组织信息。</p></div></div><div class="key-point"><div class="key-point-icon">3</div><div class="key-point-content"><h4>应用（Apply）</h4><p>在新的情境中使用程序和概念。</p></div></div></div></div><div class="content-section"><h2 class="section-title">二、教学策略类型</h2><div class="content-text"><p>教学策略是指为实现特定教学目标而采取的教学方法和组织形式。</p><div class="highlight-box"><h4>📢 直接教学策略</h4><p>适用于事实知识、基本技能和明确程序的教授。</p></div><div class="highlight-box"><h4>💬 间接教学策略</h4><p>如讨论、问题解决和探究学习，适用于培养高阶思维能力。</p></div><div class="highlight-box"><h4>🎯 独立学习策略</h4><p>如个别化教学和自定步调学习，强调学习者的自主性。</p></div></div></div><div class="content-section"><h2 class="section-title">三、学习目标与教学策略的联结</h2><div class="content-text"><p>有效的教学设计需要将学习目标与教学策略紧密匹配。</p><div class="highlight-box"><h4>💡 匹配原则</h4><p>不同类型的学习目标需要不同的教学策略来支持。</p></div><p><strong>目标-策略匹配示例：</strong></p><p>• 记忆层次 → 复述策略、练习策略</p><p>• 理解层次 → 解释策略、图解策略</p><p>• 应用层次 → 案例分析、模拟</p></div></div><div class="content-section" style="background: linear-gradient(135deg, var(--secondary-color), #2d4a6f); color: white;"><h2 class="section-title" style="color: white; border-bottom-color: rgba(255,255,255,0.2);">📚 学习小结</h2><div class="content-text" style="color: rgba(255,255,255,0.95);"><p>✅ 理解学习目标的分类体系</p><p>✅ 了解不同类型的教学策略</p><p>✅ 掌握目标与策略的匹配方法</p></div></div>` },
            { title: "教育用途的技术类型", subtitle: "学习时长：约35分钟 | 难度：基础", navItems: ["技术分类", "探究技术", "协作技术"], content: `<div class="content-section"><h2 class="section-title">一、教育技术分类概述</h2><div class="content-text"><p>教育技术可以根据其支持的学习活动类型进行分类。</p><div class="highlight-box"><h4>💡 技术选择的重要性</h4><p>选择适当的技术对于实现特定学习目标至关重要。</p></div><p><strong>主要技术类型：</strong></p><div class="key-point"><div class="key-point-icon">🔍</div><div class="key-point-content"><h4>探究技术</h4><p>支持学习者探索、发现和建构知识。</p></div></div><div class="key-point"><div class="key-point-icon">💬</div><div class="key-point-content"><h4>通信技术</h4><p>支持人与人之间的信息交流和协作。</p></div></div><div class="key-point"><div class="key-point-icon">🏗️</div><div class="key-point-content"><h4>建构技术</h4><p>支持学习者创建数字内容和解决方案。</p></div></div></div></div><div class="content-section"><h2 class="section-title">二、支持探究的技术</h2><div class="content-text"><p>探究性学习技术支持学习者主动探索和发现知识。</p><div class="highlight-box"><h4>🔬 模拟与可视化</h4><p>允许学习者操作变量、观察结果，探索因果关系。</p></div><div class="highlight-box"><h4>🧪 虚拟实验室</h4><p>在安全环境中进行实验，避免现实中的风险和成本。</p></div></div></div><div class="content-section"><h2 class="section-title">三、支持协作与通信的技术</h2><div class="content-text"><p>通信和协作技术是现代教育中不可或缺的工具。</p><div class="key-point"><div class="key-point-icon">📧</div><div class="key-point-content"><h4>异步通信工具</h4><p>如电子邮件、论坛、讨论板，支持不同时间和地点的交流。</p></div></div><div class="key-point"><div class="key-point-icon">📹</div><div class="key-point-content"><h4>同步通信工具</h4><p>如视频会议、即时消息，支持实时互动。</p></div></div><div class="key-point"><div class="key-point-icon">👥</div><div class="key-point-content"><h4>协作平台</h4><p>如Google Docs、Wiki，支持群体共同创作。</p></div></div></div></div><div class="content-section" style="background: linear-gradient(135deg, var(--secondary-color), #2d4a6f); color: white;"><h2 class="section-title" style="color: white; border-bottom-color: rgba(255,255,255,0.2);">📚 学习小结</h2><div class="content-text" style="color: rgba(255,255,255,0.95);"><p>✅ 了解教育技术的主要分类</p><p>✅ 掌握支持探究的技术类型</p><p>✅ 理解支持协作通信的技术工具</p></div></div>` },
            { title: "技术选择原则", subtitle: "学习时长：约35分钟 | 难度：中等", navItems: ["选择标准", "决策框架", "SAMR模型"], content: `<div class="content-section"><h2 class="section-title">一、技术选择的标准</h2><div class="content-text"><p>选择教育技术时需要考虑多个因素，以确保技术能够有效支持学习目标。</p><div class="highlight-box"><h4>✅ 有效性（Effectiveness）</h4><p>技术是否能够帮助学习者达成预期的学习目标？</p></div><div class="highlight-box"><h4>⚡ 效率（Efficiency）</h4><p>使用该技术所需的时间、资源和成本是否合理？</p></div><div class="highlight-box"><h4>🎯 适当性（Appropriateness）</h4><p>技术是否符合学习者的特征和需求？</p></div></div></div><div class="content-section"><h2 class="section-title">二、技术选择决策框架</h2><div class="content-text"><p>一个系统化的技术选择方法可以帮助教育者做出更好的决策。</p><div class="key-point"><div class="key-point-icon">1</div><div class="key-point-content"><h4>分析学习需求</h4><p>明确学习目标和学习者的当前状态。</p></div></div><div class="key-point"><div class="key-point-icon">2</div><div class="key-point-content"><h4>确定技术要求</h4><p>根据学习目标确定所需的技术功能。</p></div></div><div class="key-point"><div class="key-point-icon">3</div><div class="key-point-content"><h4>评估可用选项</h4><p>比较不同技术的特点，成本和支持条件。</p></div></div></div></div><div class="content-section"><h2 class="section-title">三、SAMR模型</h2><div class="content-text"><p>SAMR模型提供了一个评估技术整合深度的框架。</p><div class="highlight-box"><h4>🔄 替代（Substitution）</h4><p>技术作为传统工具的直接替代品，无功能改进。</p></div><div class="highlight-box"><h4>🔄 增强（Augmentation）</h4><p>技术作为替代但有功能改进，如拼写检查。</p></div><div class="highlight-box"><h4>改造（Modification）</h4><p>技术使新的任务成为可能，如协作文档编辑。</p></div><div class="highlight-box"><h4>重塑（Redefinition）</h4><p>技术使以前不可能的任务成为可能，如全球协作项目。</p></div></div></div><div class="content-section" style="background: linear-gradient(135deg, var(--secondary-color), #2d4a6f); color: white;"><h2 class="section-title" style="color: white; border-bottom-color: rgba(255,255,255,0.2);">📚 学习小结</h2><div class="content-text" style="color: rgba(255,255,255,0.95);"><p>✅ 理解技术选择的核心标准</p><p>✅ 掌握技术选择的决策框架</p><p>✅ 了解SAMR模型的应用</p></div></div>` }

        4: { title: "教育技术的系统视角", pages: [
            { title: "系统思维导论", subtitle: "学习时长：约35分钟 | 难度：中等", navItems: ["系统概念", "系统思维", "教育系统"], content: `<div class="content-section"><h2 class="section-title">一、系统思维概述</h2><div class="content-text"><p>系统思维是一种考虑整体而非部分的思维方式，强调理解各组成部分之间的相互关系和作用。</p><div class="highlight-box"><h4>💡 系统的定义</h4><p>系统是由相互关联和相互作用的组成部分构成的集合，这些组成部分以协调的方式共同运作以实现共同目标。</p></div><p><strong>系统的主要特征：</strong></p><div class="key-point"><div class="key-point-icon">🔗</div><div class="key-point-content"><h4>整体性</h4><p>系统整体大于部分之和，各部分协调工作产生整体效果。</p></div></div><div class="key-point"><div class="key-point-icon">🔄</div><div class="key-point-content"><h4>相互关联性</h4><p>系统各部分之间存在复杂的相互关系和依赖。</p></div></div><div class="key-point"><div class="key-point-icon">🎯</div><div class="key-point-content"><h4>目的性</h4><p>系统有明确的目标或功能。</p></div></div></div></div><div class="content-section"><h2 class="section-title">二、系统思维方法</h2><div class="content-text"><p>系统思维为分析和解决复杂问题提供了强有力的工具。</p><div class="highlight-box"><h4>🔍 系统分析步骤</h4><p>识别系统组成部分 → 分析相互关系 → 理解系统行为 → 识别杠杆点 → 实施干预</p></div><p><strong>关键的系统思维原则：</strong></p><div class="key-point"><div class="key-point-icon">⚡</div><div class="key-point-content"><h4>反馈循环</h4><p>理解正反馈和负反馈如何影响系统行为。</p></div></div><div class="key-point"><div class="key-point-icon">⏰</div><div class="key-point-content"><h4>时间延迟</h4><p>认识系统行为可能存在的时间延迟效应。</p></div></div></div></div><div class="content-section"><h2 class="section-title">三、系统思维在教育中的应用</h2><div class="content-text"><p>教育系统是复杂的社会技术系统，系统思维对理解和改进教育实践至关重要。</p><div class="highlight-box"><h4>🏫 教育系统的组成</h4><p>包括学习者、教师、课程内容、教学资源、教学环境、管理和支持系统等。</p></div></div></div><div class="content-section" style="background: linear-gradient(135deg, var(--secondary-color), #2d4a6f); color: white;"><h2 class="section-title" style="color: white; border-bottom-color: rgba(255,255,255,0.2);">📚 学习小结</h2><div class="content-text" style="color: rgba(255,255,255,0.95);"><p>✅ 理解系统思维的基本概念</p><p>✅ 掌握系统思维的主要方法</p><p>✅ 了解系统思维在教育中的应用</p></div></div>` },
            { title: "教育系统与典型教育技术系统", subtitle: "学习时长：约40分钟 | 难度：中等", navItems: ["教育系统", "典型系统", "案例分析"], content: `<div class="content-section"><h2 class="section-title">一、教育系统的特点</h2><div class="content-text"><p>教育系统是一个复杂的社会系统，具有独特的特征和运作规律。</p><div class="highlight-box"><h4>🎓 教育系统的定义</h4><p>教育系统是由教育机构、教育者、学习者、教育资源和管理系统等组成的复杂整体，旨在实现知识传递和能力培养的目标。</p></div><p><strong>教育系统的主要特征：</strong></p><div class="key-point"><div class="key-point-icon">👥</div><div class="key-point-content"><h4>社会嵌入性</h4><p>教育系统深深植根于社会文化背景之中。</p></div></div><div class="key-point"><div class="key-point-icon">📈</div><div class="key-point-content"><h4>动态复杂性</h4><p>系统各要素持续变化，相互关系复杂。</p></div></div></div></div><div class="content-section"><h2 class="section-title">二、典型的教育技术系统</h2><div class="content-text"><p>现代教育技术系统多种多样，涵盖不同的教育场景和功能需求。</p><div class="highlight-box"><h4>📚 学习型管理系统（LMS）</h4><p>如Moodle、Blackboard、Canvas，用于管理课程内容、跟踪学习进度、促进在线讨论。</p></div><div class="highlight-box"><h4>🎯 智能辅导系统（ITS）</h4><p>利用人工智能技术提供个性化辅导和适应性反馈。</p></div><div class="highlight-box"><h4>🌐 大规模开放在线课程（MOOC）</h4><p>如Coursera、edX，提供面向大规模学习者的在线课程。</p></div></div></div><div class="content-section"><h2 class="section-title">三、系统选择与整合</h2><div class="content-text"><p>在实际教育环境中，往往需要整合多种教育技术系统以满足多样化需求。</p><div class="highlight-box"><h4>🔗 系统整合的挑战</h4><p>不同系统之间的互操作性、数据共享、用户体验一致性等问题需要妥善解决。</p></div><div class="key-point"><div class="key-point-icon">🔌</div><div class="key-point-content"><h4>互操作性标准</h4><p>遵循SCORM、xAPI等标准确保系统兼容。</p></div></div><div class="key-point"><div class="key-point-icon">👤</div><div class="key-point-content"><h4>单一登录</h4><p>实现跨系统的用户身份统一认证。</p></div></div></div></div><div class="content-section" style="background: linear-gradient(135deg, var(--secondary-color), #2d4a6f); color: white;"><h2 class="section-title" style="color: white; border-bottom-color: rgba(255,255,255,0.2);">📚 学习小结</h2><div class="content-text" style="color: rgba(255,255,255,0.95);"><p>✅ 理解教育系统的基本特点</p><p>✅ 了解典型的教育技术系统类型</p><p>✅ 掌握系统整合的关键考虑</p></div></div>` },
            { title: "教育技术的五个阶段", subtitle: "学习时长：约35分钟 | 难度：中等", navItems: ["五阶段模型", "阶段详解", "实践应用"], content: `<div class="content-section"><h2 class="section-title">一、教育技术五阶段概述</h2><div class="content-text"><p>教育技术的发展和实施可以理解为一个包含五个阶段的连续过程。</p><div class="highlight-box"><h4>🔄 五阶段模型</h4><p>需求评估 → 设计/重新设计 → 开发 → 部署 → 评估与管理</p></div><p><strong>各阶段的主要任务：</strong></p><div class="key-point"><div class="key-point-icon">1</div><div class="key-point-content"><h4>需求评估</h4><p>识别问题、分析原因、确定需求。</p></div></div><div class="key-point"><div class="key-point-icon">2</div><div class="key-point-content"><h4>设计与重新设计</h4><p>规划学习活动、选择教学策略、设计评估方案。</p></div></div><div class="key-point"><div class="key-point-icon">3</div><div class="key-point-content"><h4>开发</h4><p>创建教学资源和学习环境。</p></div></div><div class="key-point"><div class="key-point-icon">4</div><div class="key-point-content"><h4>部署</h4><p>实施教学、组织学习活动、提供支持。</p></div></div><div class="key-point"><div class="key-point-icon">5</div><div class="key-point-content"><h4>评估与管理</h4><p>收集反馈、评估效果、持续改进。</p></div></div></div></div><div class="content-section"><h2 class="section-title">二、需求评估阶段</h2><div class="content-text"><p>需求评估是整个过程的起点，其质量直接影响后续工作的方向和效果。</p><div class="highlight-box"><h4>🔍 需求评估的目的</h4><p>从表面现象深入到根本原因，明确需要解决的核心问题。</p></div><p><strong>需求评估的关键步骤：</strong></p><p>1. 识别利益相关者及其需求</p><p>2. 收集和分析相关数据</p><p>3. 确定问题的优先顺序</p><p>4. 形成明确的问题陈述</p></div></div><div class="content-section"><h2 class="section-title">三、设计与开发阶段</h2><div class="content-text"><p>设计和开发阶段是将需求转化为具体解决方案的关键环节。</p><div class="highlight-box"><h4>✏️ 设计原则</h4><p>以学习目标为导向、以学习者为中心、注重教学策略的选择。</p></div><p><strong>开发阶段的关键活动：</strong></p><div class="key-point"><div class="key-point-icon">📝</div><div class="key-point-content"><h4>原型开发</h4><p>早期开发可工作的原型进行测试和反馈。</p></div></div><div class="key-point"><div class="key-point-icon">🔄</div><div class="key-point-content"><h4>迭代改进</h4><p>根据测试结果不断优化和完善。</p></div></div></div></div><div class="content-section" style="background: linear-gradient(135deg, var(--secondary-color), #2d4a6f); color: white;"><h2 class="section-title" style="color: white; border-bottom-color: rgba(255,255,255,0.2);">📚 学习小结</h2><div class="content-text" style="color: rgba(255,255,255,0.95);"><p>✅ 理解教育技术的五阶段模型</p><p>✅ 掌握需求评估的方法</p><p>✅ 了解设计与开发的关键原则</p></div></div>` }
        ]},

            { title: "用户体验基础", subtitle: "学习时长：约35分钟 | 难度：基础", navItems: ["用户体验", "可用性", "用户研究"], content: `<div class="content-section"><h2 class="section-title">一、用户体验概述</h2><div class="content-text"><p>用户体验（User Experience，简称UX）是指用户与产品或系统交互时的整体感受和体验。</p><div class="highlight-box"><h4>💡 用户体验的定义</h4><p>用户体验涵盖用户与系统交互过程中的所有方面，包括可用性、功能性、美观性和情感反应。</p></div><p><strong>用户体验的组成要素：</strong></p><div class="key-point"><div class="key-point-icon">🎯</div><div class="key-point-content"><h4>有用性（Usefulness）</h4><p>产品是否满足用户的实际需求。</p></div></div><div class="key-point"><div class="key-point-icon">✅</div><div class="key-point-content"><h4>可用性（Usability）</h4><p>用户是否能够有效地完成目标。</p></div></div><div class="key-point"><div class="key-point-icon">😊</div><div class="key-point-content"><h4>可期望性（Desirability）</h4><p>产品是否能够唤起积极的情感反应。</p></div></div></div></div><div class="content-section"><h2 class="section-title">二、可用性工程</h2><div class="content-text"><p>可用性是用户体验的核心组成部分，指用户使用产品完成任务的有效性、效率和满意度。</p><div class="highlight-box"><h4>📐 可用性指标</h4><p>有效性（任务完成率）、效率（完成任务所需时间）、满意度（用户主观评价）。</p></div><p><strong>可用性测试方法：</strong></p><div class="key-point"><div class="key-point-icon">👁️</div><div class="key-point-content"><h4>眼动追踪</h4><p>记录用户视线移动，了解视觉注意力分布。</p></div></div><div class="key-point"><div class="key-point-icon">📋</div><div class="key-point-content"><h4>任务分析</h4><p>观察用户完成具体任务的过程和步骤。</p></div></div></div></div><div class="content-section"><h2 class="section-title">三、用户研究方法</h2><div class="content-text"><p>用户研究是理解用户需求和行为的重要手段。</p><div class="highlight-box"><h4>🔬 用户研究的目的</h4><p>了解用户特征、需求、行为模式，为设计决策提供依据。</p></div><p><strong>常用的用户研究方法：</strong></p><p>• 用户访谈和焦点小组</p><p>• 问卷调查</p><p>• 观察法</p><p>• 用户画像（Persona）</p></div></div><div class="content-section" style="background: linear-gradient(135deg, var(--secondary-color), #2d4a6f); color: white;"><h2 class="section-title" style="color: white; border-bottom-color: rgba(255,255,255,0.2);">📚 学习小结</h2><div class="content-text" style="color: rgba(255,255,255,0.95);"><p>✅ 理解用户体验的基本概念</p><p>✅ 掌握可用性工程的核心指标</p><p>✅ 了解用户研究的主要方法</p></div></div>` },
            { title: "用户中心设计与学习者中心设计", subtitle: "学习时长：约40分钟 | 难度：中等", navItems: ["UCD方法", "LCD方法", "实践应用"], content: `<div class="content-section"><h2 class="section-title">一、用户中心设计（UCD）</h2><div class="content-text"><p>用户中心设计（User-Centered Design）是一种将用户需求、目标和行为置于设计过程核心的设计方法论。</p><div class="highlight-box"><h4>💡 UCD的核心原则</h4><p>设计决策应以对用户及其需求的深入理解为基础。</p></div><p><strong>UCD的设计周期：</strong></p><div class="key-point"><div class="key-point-icon">🔍</div><div class="key-point-content"><h4>理解用户和使用情境</h4><p>通过研究了解用户特征、任务环境和使用目标。</p></div></div><div class="key-point"><div class="key-point-icon">📐</div><div class="key-point-content"><h4>指定用户需求</h4><p>明确用户需求和系统需求。</p></div></div><div class="key-point"><div class="key-point-icon">🎨</div><div class="key-point-content"><h4>设计解决方案</h4><p>创建满足需求的设计方案。</p></div></div></div></div><div class="content-section"><h2 class="section-title">二、学习者中心设计（LCD）</h2><div class="content-text"><p>学习者中心设计（Learner-Centered Design）将UCD原则应用于教育领域，特别关注学习者的独特需求。</p><div class="highlight-box"><h4>🎓 LCD的核心观点</h4><p>学习者是知识建构的积极参与者，而不是被动的信息接收者。</p></div><p><strong>LCD的关键原则：</strong></p><div class="key-point"><div class="key-point-icon">👤</div><div class="key-point-content"><h4>承认学习者自主性</h4><p>尊重学习者对自己学习的所有权和控制权。</p></div></div><div class="key-point"><div class="key-point-icon">🔄</div><div class="key-point-content"><h4>适应个体差异</h4><p>考虑学习者的先前知识、学习风格和偏好。</p></div></div></div></div><div class="content-section"><h2 class="section-title">三、UCD与LCD的比较与应用</h2><div class="content-text"><p>UCD和LCD既有共同点也有差异，在教育技术设计中需要综合考虑。</p><table style="width:100%;border-collapse:collapse;"><tr style="background:var(--secondary-color);color:white;"><th style="padding:0.75rem;">方面</th><th style="padding:0.75rem;">UCD</th><th style="padding:0.75rem;">LCD</th></tr><tr><td style="padding:0.75rem;">焦点</td><td style="padding:0.75rem;">用户与产品的交互</td><td style="padding:0.75rem;">学习过程和学习体验</td></tr><tr style="background:var(--hover-bg);"><td style="padding:0.75rem;">目标</td><td style="padding:0.75rem;">提高可用性和用户满意度</td><td style="padding:0.75rem;">促进学习效果和深度学习</td></tr></table></div></div><div class="content-section" style="background: linear-gradient(135deg, var(--secondary-color), #2d4a6f); color: white;"><h2 class="section-title" style="color: white; border-bottom-color: rgba(255,255,255,0.2);">📚 学习小结</h2><div class="content-text" style="color: rgba(255,255,255,0.95);"><p>✅ 理解用户中心设计的原则和方法</p><p>✅ 掌握学习者中心设计的核心理念</p><p>✅ 能够比较和应用两种设计方法</p></div></div>` },
            { title: "ARCS动机设计模型", subtitle: "学习时长：约40分钟 | 难度：较高", navItems: ["ARCS模型", "四要素", "应用策略"], content: `<div class="content-section"><h2 class="section-title">一、ARCS模型概述</h2><div class="content-text"><p>ARCS模型是由John Keller提出的动机设计框架，用于分析和设计促进学习者动机的教学材料和环境。</p><div class="highlight-box"><h4>🎯 ARCS的含义</h4><p>Attention（注意）、Relevance（相关）、Confidence（信心）、Satisfaction（满足）。</p></div><p><strong>ARCS模型的重要性：</strong></p><p>动机是学习的关键前提，缺乏动机的学习者难以取得良好的学习效果。</p></div></div><div class="content-section"><h2 class="section-title">二、ARCS四要素详解</h2><div class="content-text"><p><strong>1. 注意（Attention）</strong></p><div class="highlight-box"><h4>💡 策略</h4><p>使用问题、案例、意外事件吸引学习者注意；运用多种媒体和表征方式维持兴趣。</p></div><p><strong>2. 相关（Relevance）</strong></p><div class="highlight-box"><h4>💡 策略</h4><p>将学习内容与学习者目标、兴趣和经验联系起来；提供选择和自主权。</p></div><p><strong>3. 信心（Confidence）</strong></p><div class="highlight-box"><h4>💡 策略</h4><p>设定清晰的学习目标；提供成功的期望；提供挑战性任务和反馈。</p></div><p><strong>4. 满足（Satisfaction）</strong></p><div class="highlight-box"><h4>💡 策略</h4><p>提供内在和外在奖励；认可成就；创造将学习应用于实际的机会。</p></div></div></div><div class="content-section"><h2 class="section-title">三、ARCS模型的应用</h2><div class="content-text"><p>ARCS模型可以应用于教学设计的各个阶段。</p><div class="highlight-box"><h4>📋 应用步骤</h4><p>分析学习者动机 → 识别动机缺口 → 选择适当策略 → 实施和评估</p></div><p><strong>实践应用示例：</strong></p><div class="key-point"><div class="key-point-icon">🎮</div><div class="key-point-content"><h4>游戏化设计</h4><p>积分、徽章、排行榜满足"满足"要素。</p></div></div><div class="key-point"><div class="key-point-icon">🎯</div><div class="key-point-content"><h4>目标设定</h4><p>清晰的目标和进度追踪增强"信心"。</p></div></div></div></div><div class="content-section" style="background: linear-gradient(135deg, var(--secondary-color), #2d4a6f); color: white;"><h2 class="section-title" style="color: white; border-bottom-color: rgba(255,255,255,0.2);">📚 学习小结</h2><div class="content-text" style="color: rgba(255,255,255,0.95);"><p>✅ 理解ARCS模型的四个要素</p><p>✅ 掌握各要素的设计策略</p><p>✅ 能够在教学设计中应用ARCS模型</p></div></div>` }

            { title: "教育技术分类与有意义学习体验原则", subtitle: "学习时长：约40分钟 | 难度：中等", navItems: ["技术分类", "体验原则", "设计指南"], content: `<div class="content-section"><h2 class="section-title">一、教育技术分类</h2><div class="content-text"><p>教育技术可以从多个维度进行分类，理解这些分类有助于选择适当的技术支持学习体验。</p><div class="highlight-box"><h4>📂 按功能分类</h4><p>传递技术（传递教学内容）、交互技术（促进师生互动）、创作技术（支持内容创作）。</p></div><p><strong>按媒体形式分类：</strong></p><div class="key-point"><div class="key-point-icon">📝</div><div class="key-point-content"><h4>文本类</h4><p>电子书籍、文档、网页内容。</p></div></div><div class="key-point"><div class="key-point-icon">🎨</div><div class="key-point-content"><h4>图像类</h4><p>图片、图表，信息图表。</p></div></div><div class="key-point"><div class="key-point-icon">🎵</div><div class="key-point-content"><h4>音视频类</h4><p>播客、视频课程、动画。</p></div></div></div></div><div class="content-section"><h2 class="section-title">二、有意义学习体验的原则</h2><div class="content-text"><p>有意义的的学习体验能够促进深度学习和知识迁移。</p><div class="highlight-box"><h4>✨ 有意义学习体验的特征</h4><p>主动参与、情境关联、互动协作、反思反馈、多元表征。</p></div><p><strong>Merrill的首要原则：</strong></p><div class="key-point"><div class="key-point-icon">1</div><div class="key-point-content"><h4>问题中心</h4><p>学习应该围绕有意义的问题展开。</p></div></div><div class="key-point"><div class="key-point-icon">2</div><div class="key-point-content"><h4>激活旧知</h4><p>帮助学习者激活相关先验知识。</p></div></div><div class="key-point"><div class="key-point-icon">3</div><div class="key-point-content"><h4>示证新知</h4><p>提供清晰的知识示证和样例。</p></div></div></div></div><div class="content-section"><h2 class="section-title">三、创造有意义体验的策略</h2><div class="content-text"><p>教育技术人员可以通过多种策略创造有意义的学習体验。</p><div class="highlight-box"><h4>🎯 设计策略</h4><p>真实情境、渐进式难度、即时反馈、选择与自主。</p></div><p><strong>实践建议：</strong></p><p>• 使用真实世界的案例和项目</p><p>• 提供多样化的学习路径选择</p><p>• 设计协作学习活动</p></div></div><div class="content-section" style="background: linear-gradient(135deg, var(--secondary-color), #2d4a6f); color: white;"><h2 class="section-title" style="color: white; border-bottom-color: rgba(255,255,255,0.2);">📚 学习小结</h2><div cl             { title: "学习者体验评估指标", subtitle: "学习时长：约35分钟 | 难度：中等", navItems: ["评估框架", "五项指标", "应用方法"], content: `<div class="content-section"><h2 class="section-title">一、学习者体验评估概述</h2><div class="content-text"><p>评估学习者体验对于改进教学设计和提升教育质量至关重要。</p><div class="highlight-box"><h4>📊 评估的目的</h4><p>了解学习者对学习体验的感受，识别改进机会，为设计决策提供依据。</p></div><p><strong>评估维度：</strong></p><div class="key-point"><div class="key-point-icon">📈</div><div class="key-point-content"><h4>学习效果</h4><p>学习目标达成程度，知识技能掌握情况。</p></div></div><div class="key-point"><div class="key-point-icon">😊</div><div class="key-point-content"><h4>情感反应</h4><p>满意度、兴趣、动机水平。</p></div></div><div class="key-point"><div class="key-point-icon">🎯</div><div class="key-point-content"><h4>行为表现</h4><p>参与度、互动频率、学习投入时间。</p></div></div></div></div><div class="content-section"><h2 class="section-title">二、学习者体验的五项指标</h2><div class="content-text"><p>根据Keller的ARCS模型和可用性研究，学习者体验可以从以下五个方面评估：</p><div class="key-point"><div class="key-point-icon">💎</div><div class="key-point-content"><h4>1. 价值感（Value）</h4><p>学习者是否认为学习内容有价值？</p></div></div><div class="key-point"><div class="key-point-icon">✅</div><div class="key-point-content"><h4>2. 可用性（Usability）</h4><p>学习者是否觉得技术易于使用？</p></div></div><div class="key-point"><div class="key-point-icon">😍</div><div class="key-point-content"><h4>3. 期望性（Desirability）</h4><p>学习者是否享受使用该技术？</p></div></div><div class="key-point"><div class="key-point-icon">🔄</div><div class="key-point-content"><h4>4. 适应性（Adaptability）</h4><p>技术是否适应个人需求和偏好？</p></div></div><div class="key-point"><div class="key-point-icon">🤗</div><div class="key-point-content"><h4>5. 舒适性（Comfortability）</h4><p>学习者使用技术时是否感到舒适？</p></div></div></div></div><div class="content-section"><h2 class="section-title">三、评估方法与应用</h2><div class="content-text"><p>综合运用多种评估方法可以获得全面的学习者体验信息。</p><div class="highlight-box"><h4>🔬 评估方法</h4><p>问卷调查、访谈、观察、行为数据分析、焦点小组。</p></div><p><strong>应用流程：</strong></p><p>1. 明确评估目标和问题</p><p>2. 选择适当的评估方法</p><p>3. 收集和分析数据</p><p>4. 解释结果并提出建议</p></div></             { title: "学习空间的定义与PST框架", subtitle: "学习时长：约40分钟 | 难度：中等", navItems: ["学习空间定义", "PST框架", "设计要素"], content: `<div class="content-section"><h2 class="section-title">一、学习空间的定义</h2><div class="content-text"><p>学习空间是指支持学习者进行学习活动的物理的、虚拟的或混合的学习环境。</p><div class="highlight-box"><h4>💡 学习空间的广义理解</h4><p>学习空间不仅包括传统的教室，还包括图书馆、实验室、工作场所、家庭环境以及数字化的虚拟学习环境。</p></div><p><strong>学习空间的主要特征：</strong></p><div class="key-point"><div class="key-point-icon">🏛️</div><div class="key-point-content"><h4>物理空间</h4><p>包括教室、实验室、图书馆等实体学习场所的布局和设施。</p></div></div><div class="key-point"><div class="key-point-icon">💻</div><div class="key-point-content"><h4>虚拟空间</h4><p>在线学习平台、虚拟教室、协作空间等数字化环境。</p></div></div><div class="key-point"><div class="key-point-icon">🔗</div><div class="key-point-content"><h4>混合空间</h4><p>融合物理和虚拟元素，支持灵活的学习方式。</p></div></div></div></div><div class="content-section"><h2 class="section-title">二、PST框架（教学法-空间-技术）</h2><div class="content-text"><p>PST框架是理解和设计学习空间的重要工具，强调教学法、空间和技术三个维度的协调统一。</p><div class="highlight-box"><h4>🔺 PST框架的核心思想</h4><p>学习空间的设计需要同时考虑教学法的需求、空间的物理特性以及技术的支撑能力，三者缺一不可。</p></div><p><strong>PST三要素：</strong></p><div class="key-point"><div class="key-point-icon">📚</div><div class="key-point-content"><h4>教学法（Pedagogy）</h4><p>学习理论、教学策略、教学模式的选择。</p></div></div><div class="key-point"><div class="key-point-icon">🏗️</div><div class="key-point-content"><h4>空间（Space）</h4><p>学习环境的物理或虚拟布局与设计。</p></div></div><div class="key-point"><div class="key-point-icon">💻</div><div class="key-point-content"><h4>技术（Technology）</h4><p>支持学习的各种工具、媒体和数字资源。</p></div></div></div></div><div class="content-section"><h2 class="section-title">三、学习空间设计的关键要素</h2><div class="content-text"><p>有效的学习空间设计需要考虑多个关键要素，以确保学习体验的质量。</p><div class="highlight-box"><h4>🎯 设计原则</h4><p>灵活性、可访问性、互动性、舒适性、安全性。</p></div><p><strong>核心要素：</strong></p><p>1. 空间布局应支持多种教学活动类型</p><p>2. 技术设施应便于获取和使用</p><p>3. 环境应促进协作和社交互动</p><p>4. 设计应适应不同学习者的需求</p></div></div><div class="content-section" style="background: linear-gradient(135deg,             { title: "学习空间设计的原则与示例", subtitle: "学习时长：约40分钟 | 难度：中等", navItems: ["设计原则", "有效示例", "实践指南"], content: `<div class="content-section"><h2 class="section-title">一、学习空间设计的核心原则</h2><div class="content-text"><p>学习空间设计应遵循一系列核心原则，以确保空间能够有效支持学习活动。</p><div class="highlight-box"><h4>✨ 首要原则</h4><p>学习空间的设计应当以学习者为中心，以支持特定的学习活动为目标。</p></div><p><strong>主要设计原则：</strong></p><div class="key-point"><div class="key-point-icon">🔄</div><div class="key-point-content"><h4>灵活性原则</h4><p>空间布局应能够灵活调整，以适应不同的教学活动和学习方式。</p></div></div><div class="key-point"><div class="key-point-icon">👥</div><div class="key-point-content"><h4>协作性原则</h4><p>空间设计应促进学生之间的互动和协作学习。</p></div></div><div class="key-point"><div class="key-point-icon">🎯</div><div class="key-point-content"><h4>技术整合原则</h4><p>技术设施应与教学法紧密结合，而非简单的技术堆砌。</p></div></div></div></div><div class="content-section"><h2 class="section-title">二、有效学习空间的典型示例</h2><div class="content-text"><p>以下是一些经过实践验证的有效学习空间设计案例。</p><div class="highlight-box"><h4>🏫 主动学习教室（Active Learning Classroom）</h4><p>可移动的桌椅、多个显示屏、支持小组讨论和协作的空间布局。</p></div><div class="highlight-box"><h4>🔬 创新实验室（Innovation Lab）</h4><p>配备3D打印机、编程工具、创客空间的开放式学习环境。</p></div><div class="highlight-box"><h4>💻 技术整合教室</h4><p>将技术有机融入教学环境，支持混合式学习模式。</p></div></div></div><div class="content-section"><h2 class="section-title">三、学习空间设计的实践指南</h2><div class="content-text"><p>在设计和改造学习空间时，应遵循系统的实践指南。</p><div class="highlight-box"><h4>📋 实践步骤</h4><p>需求分析 → 设计规划 → 实施建设 → 评估改进</p></div><p><strong>关键考虑因素：</strong></p><p>• 明确学习活动的类型和需求</p><p>• 考虑不同学习者的多样化需求</p><p>• 确保技术的可靠性和易用性</p><p>• 建立持续评估和改进机制</p></div></div><div class="content-section" style="background: linear-gradient(135deg, var(--secondary-color), #2d4a6f); color: white;"><h2 class="section-title" style="color: white; border-bottom-color: rgba(255,255,255,0.2);">📚 学习小结</h2><div class="content-text" style="color: rgba(255,255,255,0.95);"><p>✅ 掌握学习空间设计的核心原则</p><p>✅ 了解有效学习空间的典型特征</p><p>✅ 能够在实践中应用设计指南</p></div></div>` },

            { title: "教育项目的定义与特征", subtitle: "学习时长：约40分钟 | 难度：中等", navItems: ["项目定义", "基本特征", "生命周期"], content: `<div class="content-section"><h2 class="section-title">一、教育项目的定义</h2><div class="content-text"><p>教育项目是指为实现特定的教育目标，在限定的时间内、预算内和资源条件下开展的一系列相互关联的教育活动和任务的集合。</p><div class="highlight-box"><h4>📋 项目的关键特征</h4><p>明确的目标、限定的时间、特定的资源、独特性、跨学科性。</p></div><p><strong>教育项目的类型：</strong></p><div class="key-point"><div class="key-point-icon">🎓</div><div class="key-point-content"><h4>课程开发项目</h4><p>开发新的课程资源或改造现有课程。</p></div></div><div class="key-point"><div class="key-point-icon">💻</div><div class="key-point-content"><h4>技术集成项目</h4><p>将技术引入教育环境的实施项目。</p></div></div><div class="key-point"><div class="key-point-icon">🏫</div><div class="key-point-content"><h4>培训项目</h4><p>针对教师或专业人员的专业发展项目。</p></div></div></div></div><div class="content-section"><h2 class="section-title">二、教育项目的基本特征</h2><div class="content-text"><p>教育项目具有区别于一般教育活动的独特特征。</p><div class="highlight-box"><h4>🔍 核心特征</h4><p>目标导向性、临时性、独特性、不确定性、资源约束性。</p></div><p><strong>详细说明：</strong></p><div class="key-point"><div class="key-point-icon">🎯</div><div class="key-point-content"><h4>目标导向</h4><p>项目有明确的目标和预期成果。</p></div></div><div class="key-point"><div class="key-point-icon">⏱️</div><div class="key-point-content"><h4>时间限定</h4><p>项目有明确的开始和结束时间。</p></div></div><div class="key-point"><div class="key-point-icon">💰</div><div class="key-point-content"><h4>资源约束</h4><p>项目在预算、人力等方面受到限制。</p></div></div></div></div><div class="content-section"><h2 class="section-title">三、教育项目的生命周期</h2><div class="content-text"><p>教育项目遵循一个完整的生命周期，包括多个阶段。</p><div class="highlight-box"><h4>🔄 生命周期阶段</h4><p>启动 → 规划 → 实施 → 监控 → 收尾</p></div><p><strong>各阶段主要任务：</strong></p><p>1. 启动阶段：明确项目需求和目标</p><p>2. 规划阶段：制定详细计划和策略</p><p>3. 实施阶段：执行计划并交付成果</p><p>4. 监控阶段：跟踪进度和质量</p><p>5. 收尾阶段：总结经验教训和评估成果</p></div></div><div class="content-section" style="background: linear-gradient(135deg, var(--secondary-color), #2d4a6f); color: white;"><h2 class="section-title" style="color:             { title: "教育项目设计与逻辑模型", subtitle: "学习时长：约45分钟 | 难度：较高", navItems: ["逻辑模型", "项目要素", "设计方法"], content: `<div class="content-section"><h2 class="section-title">一、逻辑模型概述</h2><div class="content-text"><p>逻辑模型是教育项目设计的核心工具，用于描述项目各要素之间的逻辑关系和因果链条。</p><div class="highlight-box"><h4>🔗 逻辑模型的意义</h4><p>逻辑模型帮助项目设计者清晰表达项目理念，建立目标与活动之间的逻辑联系。</p></div><p><strong>逻辑模型的核心要素：</strong></p><div class="key-point"><div class="key-point-icon">📥</div><div class="key-point-content"><h4>输入（Inputs）</h4><p>项目所需的人力、资金、时间、设备等资源。</p></div></div><div class="key-point"><div class="key-point-icon">⚙️</div><div class="key-point-content"><h4>活动（Activities）</h4><p>项目执行过程中的具体行动和任务。</p></div></div><div class="key-point"><div class="key-point-icon">📤</div><div class="key-point-content"><h4>产出（Outputs）</h4><p>活动直接产生的有形产品或服务。</p></div></div><div class="key-point"><div class="key-point-icon">🎯</div><div class="key-point-content"><h4>成果（Outcomes）</h4><p>项目带来的预期变化和影响。</p></div></div></div></div><div class="content-section"><h2 class="section-title">二、目标的设定</h2><div class="content-text"><p>教育项目目标的设定需要遵循SMART原则，即具体、可衡量、可实现、相关、有时限。</p><div class="highlight-box"><h4>🎯 目标层次</h4><p>总体目标 → 具体目标 → 可衡量指标</p></div><p><strong>目标设定的注意事项：</strong></p><div class="key-point"><div class="key-point-icon">✓</div><div class="key-point-content"><h4>清晰性</h4><p>目标表述应清楚明确，避免歧义。</p></div></div><div class="key-point"><div class="key-point-icon">📊</div><div class="key-point-content"><h4>可衡量性</h4><p>目标应能够通过具体指标进行评估。</p></div></div><div class="key-point"><div class="key-point-icon">🎯</div><div class="key-point-content"><h4>现实性</h4><p>目标应在现有资源和条件下可实现。</p></div></div></div></div><div class="content-section"><h2 class="section-title">三、输入因素与产出</h2><div class="content-text"><p>项目的成功依赖于合理的输入和有效的产出规划。</p><div class="highlight-box"><h4>📦 主要输入因素</h4><p>人力资源、财务资源、物质资源、时间资源、信息资源。</p></div><p><strong>产出规划要点：</strong></p><p>• 产出应与项目活动直接相关</p><p>• 产出应具有可交付性</p><p>• 应明确产出的质量和数量标准</p></div></div><div class="content-section" style="background: linear-gradient(135deg, var(--secondary-color), #2d4a6f); color: white;"><h2 class="section-title" style="color: white; border-bottom-color: rgba(255,255,255,0.2);">📚 学习小结</h2><div class="content-text" style="color: rgba(255,255,255,0.95);"><p>✅ 理解逻辑模型的核心概念</p><p>✅ 掌握目标设定的SMART原则</p><p>✅ 了解输入因素与产出的关系</p></div></div>` },

            { title: "设计型研究的概念与特征", subtitle: "学习时长：约40分钟 | 难度：较高", navItems: ["DBR概念", "核心特征", "理论基础"], content: `<div class="content-section"><h2 class="section-title">一、设计型研究的概念</h2><div class="content-text"><p>设计型研究（Design-Based Research，DBR）是一种通过设计和使用人工制品来推进学习环境改进的研究方法论。</p><div class="highlight-box"><h4>🔬 DBR的定义</h4><p>设计型研究是一种系统性探究方法，通过设计创新解决方案并在真实情境中实施，来产生新的理论知识和实践智慧。</p></div><p><strong>DBR的核心思想：</strong></p><div class="key-point"><div class="key-point-icon">🏗️</div><div class="key-point-content"><h4>设计导向</h4><p>研究旨在设计和创造新的教育干预或环境。</p></div></div><div class="key-point"><div class="key-point-icon">🔄</div><div class="key-point-content"><h4>迭代循环</h4><p>通过反复设计、实施、评估和改进的循环推进研究。</p></div></div><div class="key-point"><div class="key-point-icon">📚</div><div class="key-point-content"><h4>理论贡献</h4><p>研究同时贡献实践解决方案和理论知识。</p></div></div></div></div><div class="content-section"><h2 class="section-title">二、设计型研究的核心特征</h2><div class="content-text"><p>设计型研究具有多项区别于传统研究的独特特征。</p><div class="highlight-box"><h4>⭐ 核心特征</h4><p>干预主义、实用性、迭代性、协作性、情境敏感性、理论驱动。</p></div><p><strong>详细说明：</strong></p><div class="key-point"><div class="key-point-icon">🛠️</div><div class="key-point-content"><h4>干预主义</h4><p>研究者积极设计和引入教育干预，而非被动观察。</p></div></div><div class="key-point"><div class="key-point-icon">🔁</div><div class="key-point-content"><h4>迭代性</h4><p>研究过程包含多轮设计-实施-评估循环。</p></div></div><div class="key-point"><div class="key-point-icon">👥</div><div class="key-point-content"><h4>协作性</h4><p>研究者与实践者紧密合作，共同参与研究。</p></div></div></div></div><div class="content-section"><h2 class="section-title">三、设计型研究的理论基础</h2><div class="content-text"><p>设计型研究建立在多个理论基础之上，融合了多种研究传统的优势。</p><div class="highlight-box"><h4>📖 理论基础</h4><p>学习理论、教学理论、设计科学、行动研究。</p></div><p><strong>理论基础的作用：</strong></p><p>• 为设计提供科学依据</p><p>• 指导干预的设计和实施</p><p>• 为研究发现提供解释框架</p></div></div><div class="content-section" style="background: linear-gradient(135deg, var(--secondary-color), #2d4a6f); color: white;"><h2 class="section-title" style="color: white; border-bottom-color: rgba(255,255,255,0.2);">📚 学习小结</h2><div class="content-text" style="color: rgba(255,255,255,0.95);"><p>✅ 理解设计型研究的基本概念</p><p>✅ 掌握设计型研究的核心特征</p><p>✅ 了解设计型研究的理论基础</p></div></div>` },
            { title: "设计型研究的过程", subtitle: "学习时长：约45分钟 | 难度：较高", navItems: ["研究过程", "分析探索", "设计构建"], content: `<div class="content-section"><h2 class="section-title">一、设计型研究的一般过程</h2><div class="content-text"><p>设计型研究遵循一个系统的过程，包括多个相互关联的阶段。</p><div class="highlight-box"><h4>🔄 DBR研究循环</h4><p>分析与探索 → 设计与构建 → 评估与反思 → 与实践互动</p></div><p><strong>各阶段主要任务：</strong></p><div class="key-point"><div class="key-point-icon">1</div><div class="key-point-content"><h4>分析与探索</h4><p>识别问题、理解情境、研究相关文献。</p></div></div><div class="key-point"><div class="key-point-icon">2</div><div class="key-point-content"><h4>设计与构建</h4><p>开发干预方案、创建原型、准备实施。</p></div></div><div class="key-point"><div class="key-point-icon">3</div><div class="key-point-content"><h4>评估与反思</h4><p>收集数据、分析效果、提炼经验。</p></div></div><div class="key-point"><div class="key-point-icon">4</div><div class="key-point-content"><h4>实施与推广</h4><p>在实践中测试应用、总结推广。</p></div></div></div></div><div class="content-section"><h2 class="section-title">二、分析与探索阶段</h2><div class="content-text"><p>这是设计型研究的起点，需要深入理解要解决的问题和情境。</p><div class="highlight-box"><h4>🔍 关键活动</h4><p>问题识别、情境分析、文献综述、利益相关者分析。</p></div><p><strong>分析要点：</strong></p><div class="key-point"><div class="key-point-icon">❓</div><div class="key-point-content"><h4>问题识别</h4><p>明确教育实践中存在的具体问题。</p></div></div><div class="key-point"><div class="key-point-icon">🏫</div><div class="key-point-content"><h4>情境分析</h4><p>了解问题发生的具体情境和背景。</p></div></div><div class="key-point"><div class="key-point-icon">📚</div><div class="key-point-content"><h4>理论探索</h4><p>研究相关理论和已有解决方案。</p></div></div></div></div><div class="content-section"><h2 class="section-title">三、设计与构建阶段</h2><div class="content-text"><p>这是将分析阶段的洞见转化为具体设计方案的关键阶段。</p><div class="highlight-box"><h4>✏️ 设计原则</h4><p>理论指导、迭代完善、实践导向、利益相关者参与。</p></div><p><strong>设计步骤：</strong></p><p>1. 明确设计目标和约束条件</p><p>2. 生成多个设计方案</p><p>3. 选择和优化最佳方案</p><p>4. 开发可工作的原型</p></div></div><div class="content-section" style="background: linear-gradient(135deg, var(--secondary-color), #2d4a6f); color: white;"><h2 class="section-title" style="color: white; border-bottom-color: rgba(255,255,255,0.2);">📚 学习小结</h2><div class="content-text" style="color: rgba(255,255,255,0.95);"><p>✅ 理解设计型研究的一般过程</p><p>✅ 掌握分析与探索阶段的方法</p><p>✅ 了解设计与构建阶段的原则</p></div></div>` },
            { title: "设计型研究的应用", subtitle: "学习时长：约40分钟 | 难度：中等", navItems: ["DBR应用", "案例分析", "与传统研究比较"], content: `<div class="content-section"><h2 class="section-title">一、设计型研究的应用场景</h2><div class="content-text"><p>设计型研究广泛应用于教育技术领域的各种情境中。</p><div class="highlight-box"><h4>🎯 典型应用领域</h4><p>学习环境设计、课程开发、教学策略优化、技术整合。</p></div><p><strong>应用示例：</strong></p><div class="key-point"><div class="key-point-icon">💻</div><div class="key-point-content"><h4>在线学习平台设计</h4><p>设计和优化数字化学习环境。</p></div></div><div class="key-point"><div class="key-point-icon">🎮</div><div class="key-point-content"><h4>游戏化学习设计</h4><p>开发游戏化学习解决方案。</p></div></div><div class="key-point"><div class="key-point-icon">🤝</div><div class="key-point-content"><h4>协作学习环境</h4><p>设计和改进协作学习空间。</p></div></div></div></div><div class="content-section"><h2 class="section-title">二、设计型研究案例分析</h2><div class="content-text"><p>通过具体案例可以更好地理解设计型研究的实际应用。</p><div class="highlight-box"><h4>📋 案例研究要素</h4><p>背景、问题、设计、实施、评估、反思。</p></div><p><strong>案例分析要点：</strong></p><div class="key-point"><div class="key-point-icon">🔍</div><div class="key-point-content"><h4>情境特殊性</h4><p>理解设计决策如何适应特定情境。</p></div></div><div class="key-point"><div class="key-point-icon">🔄</div><div class="key-point-content"><h4>迭代过程</h4><p>追踪设计如何通过迭代不断完善。</p></div></div><div class="key-point"><div class="key-point-icon">📈</div><div class="key-point-content"><h4>理论贡献</h4><p>了解研究产生的实践和理论成果。</p></div></div></div></div><div class="content-section"><h2 class="section-title">三、DBR与传统实证研究的比较</h2><div class="content-text"><p>设计型研究区别于传统实证研究，具有独特的价值。</p><div class="highlight-box"><h4>⚖️ 主要差异</h4><p>研究目的、研究方法、情境依赖、理论贡献。</p></div><p><strong>DBR的优势：</strong></p><p>• 更贴近教育实践</p><p>• 产生可应用的解决方案</p><p>• 贡献情境化的理论</p><p>• 促进研究与实践的结合</p></div></div><div class="content-section" style="background: linear-gradient(135deg, var(--secondary-color), #2d4a6f); color: white;"><h2 class="section-title" style="color: white; border-bottom-color: rgba(255,255,255,0.2);">📚 学习小结</h2><div class="content-text"             { title: "学习活动设计与布鲁姆分类学", subtitle: "学习时长：约45分钟 | 难度：中等", navItems: ["学习活动", "布鲁姆分类", "活动设计"], content: `<div class="content-section"><h2 class="section-title">一、学习活动设计概述</h2><div class="content-text"><p>学习活动是教学设计的核心组成部分，是学习者为达成学习目标而参与的具体任务、行动或事件。</p><div class="highlight-box"><h4>📌 学习活动的定义</h4><p>学习活动是学习者为达成学习目标而参与的具体任务、行动或事件，包括阅读、讨论、实践、反思等多种形式。</p></div><p><strong>学习活动的组成要素：</strong></p><div class="key-point"><div class="key-point-icon">🎯</div><div class="key-point-content"><h4>学习目标</h4><p>活动应该指向明确的学习目标。</p></div></div><div class="key-point"><div class="key-point-icon">📋</div><div class="key-point-content"><h4>学习任务</h4><p>学习者需要完成的具体任务或问题。</p></div></div><div class="key-point"><div class="key-point-icon">🔧</div><div class="key-point-content"><h4>学习支持</h4><p>帮助学习者完成活动的资源和指导。</p></div></div></div></div><div class="content-section"><h2 class="section-title">二、布鲁姆分类学（修订版）</h2><div class="content-text"><p>布鲁姆分类学将认知领域的学习目标分为六个层次，由低到高依次递进。</p><div class="highlight-box"><h4 name="bloom">🧠 布鲁姆分类学（修订版）</h4><p>记忆（Remember）→ 理解（Understand）→ 应用（Apply）→ 分析（Analyze）→ 评价（Evaluate）→ 创造（Create）</p></div><p><strong>各层次详细说明：</strong></p><div class="key-point"><div class="key-point-icon">1</div><div class="key-point-content"><h4>记忆</h4><p>识别和回忆事实、概念、程序。</p></div></div><div class="key-point"><div class="key-point-icon">2</div><div class="key-point-content"><h4>理解</h4><p>解释含义，构建意义，组织信息。</p></div></div><div class="key-point"><div class="key-point-icon">3</div><div class="key-point-content"><h4>应用</h4><p>在新的情境中使用程序和概念。</p></div></div><div class="key-point"><div class="key-point-icon">4</div><div class="key-point-content"><h4>分析</h4><p>将整体分解为部分，识别关系。</p></div></div></div></div><div class="content-section"><h2 class="section-title">三、基于布鲁姆分类学的活动设计</h2><div class="content-text"><p>根据布鲁姆分类学的目标层次，设计相应的学习活动。</p><div class="highlight-box"><h4>🎯 目标-活动匹配</h4><p>不同层次的学习目标需要不同类型的学习活动来支持。</p></div><p><strong>设计建议：</strong></p><p>• 记忆层次：复述、列表、定义练习</p><p>• 理解层次：解释、总结、图解</p><p>• 应用层次：案例分析、问题解             { title: "认知负荷理论与多媒体学习原则", subtitle: "学习时长：约45分钟 | 难度：较高", navItems: ["认知负荷理论", "Mayer原则", "实践应用"], content: `<div class="content-section"><h2 class="section-title">一、认知负荷理论</h2><div class="content-text"><p>认知负荷理论（Cognitive Load Theory）由John Sweller提出，是多媒体学习设计的重要理论基础。</p><div class="highlight-box"><h4>🧠 核心观点</h4><p>学习者的认知资源有限，教学设计应避免超过工作记忆容量，以促进有效学习。</p></div><p><strong>认知负荷的三种类型：</strong></p><div class="key-point"><div class="key-point-icon">📚</div><div class="key-point-content"><h4>内在认知负荷</h4><p>由学习材料本身的复杂性产生的负荷。</p></div></div><div class="key-point"><div class="key-point-icon">🔨</div><div class="key-point-content"><h4>外在认知负荷</h4><p>由教学设计不当导致的额外负荷。</p></div></div><div class="key-point"><div class="key-point-icon">➕</div><div class="key-point-content"><h4>相关认知负荷</h4><p>用于构建知识图式的有意义的负荷。</p></div></div></div></div><div class="content-section"><h2 class="section-title">二、Mayer的多媒体学习原则</h2><div class="content-text"><p>Richard Mayer基于认知科学的研究，提出了一系列多媒体学习的设计原则。</p><div class="highlight-box"><h4 name="mayer">🎨 Mayer原则（12条）</h4><p>多媒体原则、空间邻近原则、时间邻近原则、一致性原则、形式原则、冗余原则、个体差异原则等。</p></div><p><strong>核心原则：</strong></p><div class="key-point"><div class="key-point-icon">🖼️</div><div class="key-point-content"><h4>多媒体原则</h4><p>文字和图像结合比纯文字效果更好。</p></div></div><div class="key-point"><div class="key-point-icon">📍</div><div class="key-point-content"><h4>空间邻近原则</h4><p>相关的文字和图像应邻近呈现。</p></div></div><div class="key-point"><div class="key-point-icon">⏰</div><div class="key-point-content"><h4>时间邻近原则</h4><p>文字和图像应同步呈现。</p></div></div></div></div><div class="content-section"><h2 class="section-title">三、认知负荷理论的实践应用</h2><div class="content-text"><p>基于认知负荷理论的教学设计策略。</p><div class="highlight-box"><h4 name="practical">💡 降低外在认知负荷的策略</h4><p>简化界面、删除冗余信息、分步呈现、提供指导。</p></div><p><strong>实践建议：</strong></p><p>• 避免不必要的装饰和动画</p><p>• 将复杂内容分解为小步骤</p><p>• 提供清晰的导航和指引</p><p>• 合理利用图像和图表</p></div></div><div class="content-section" style="background: linear-gradient(135deg, var(--secondary-color), #2d4a6f); color: white;"><h2 class="section-title" style="color: white; border-bottom-color: rgba(255,255,255,0.2);">📚 学习小结</h2><div class="content-text" style="color: rgba(255,255,255,0.95);"><p>✅ 理解认知负荷理论的核心概念</p><p>✅ 掌握Mayer多媒体学习的主要原则</p><p>✅ 能够在实践中应用认知负荷理论</p></div></div>` },
            { title: "ADDIE模型详解", subtitle: "学习时长：约45分钟 | 难度：中等", navItems: ["ADDIE模型", "五阶段详解", "实践指南"], content: `<div class="content-section"><h2 class="section-title">一、ADDIE模型概述</h2><div class="content-text"><p>ADDIE模型是教学系统设计（ISD）中最经典和广泛使用的模型之一，为教学设计和开发提供了系统化的框架。</p><div class="highlight-box"><h4>🔤 ADDIE的含义</h4><p>Analysis（分析）→ Design（设计）→ Development（开发）→ Implementation（实施）→ Evaluation（评估）</p></div><p><strong>ADDIE模型的特点：</strong></p><div class="key-point"><div class="key-point-icon">🔄</div><div class="key-point-content"><h4>系统性</h4><p>每一步都为下一步奠定基础。</p></div></div><div class="key-point"><div class="key-point-icon">🔁</div><div class="key-point-content"><h4>迭代性</h4><p>各阶段可以循环迭代，不断完善。</p></div></div><div class="key-point"><div class="key-point-icon">📋</div><div class="key-point-content"><h4>灵活性</h4><p>可根据项目需求进行调整。</p></div></div></div></div><div class="content-section"><h2 class="section-title">二、ADDIE各阶段详解</h2><div class="content-text"><p><strong>1. 分析阶段（Analysis）</strong></p><div class="highlight-box"><h4>🔍 分析内容</h4><p>学习者特征分析、任务分析、环境分析、成本-效益分析。</p></div><p><strong>2. 设计阶段（Design）</strong></p><div class="highlight-box"><h4>✏️ 设计内容</h4><p>学习目标编写、教学策略选择、评估设计、原型规划。</p></div><p><strong>3. 开发阶段（Development）</strong></p><div class="highlight-box"><h4>🛠️ 开发内容</h4><p>教学资源制作、技术工具开发、内容编写、测试修改。</p></div></div></div><div class="content-section"><h2 class="section-title">三、ADDIE模型的实施与评估</h2><div class="content-text"><p><strong>4. 实施阶段（Implementation）</strong></p><div class="highlight-box"><h4>🚀 实施内容</h4><p>试点实施、全 面推广、培训支持、持续监控。</p></div><p><strong>5. 评估阶段（Evaluation）</strong></p><div class="highlight-box"><h4>📊 评估内容</h4><p>形成性评估、总结性评估、影响评估、ROI分析。</p></div><p><strong>评估的重要性：</strong></p><p>• 确保项目达到预期目标</p><p>• 识别改进机会</p><p>• 证明项目价值</p></div></div><div class="content-section" style="background: linear-gradient(135deg, var(--secondary-color), #2d4a6f); color: white;"><h2 class="section-title" style="color: white; border-bottom-color: rgba(255,255,255,0.2);">📚 学习小结</h2><div clas     // 合并数据（包含章节1-8的完整内容以及章节9-13的完整内容）
    const allChapterData = { ...chapterData, ...defaultContent, ...chapter9to13 };

    // 更新页面内容
    function updatePage() {
        const chapter = allChapterData[currentChapter] || allChapterData[1];
        const pages = chapter.pages;
        const pageIndex = Math.min(currentPage - 1, pages.length - 1);
        const page = pages[pageIndex] || pages[0];
        const isLastPage = currentPage >= pages.length;
        const isFirstPage = currentPage <= 1;

        // 更新标题和副标题
        document.getElementById('chapterBadge').textContent = `第${currentChapter}章 · 文字学习`;
        document.getElementById('pageTitle').textContent = page.title;
        document.getElementById('pageSubtitle').textContent = page.subtitle;
        document.getElementById('sidebarChapter').textContent = chapter.title;
        document.title = `文字学习 - ${page.title}`;

        // 更新导航
        const navList = document.getElementById('navList');
        navList.innerHTML = page.navItems.map((item, i) =>
            `<li><a href="#section${i+1}" onclick="scrollToSection(event, ${i+1})" class="${i === 0 ? 'active' : ''}">${item}</a></li>`
        ).join('');

        // 更新内容
        document.getElementById('pageContent').innerHTML = page.content;

        // 更新页码指示器
        document.getElementById('pageIndicator').innerHTML = `<span>${currentPage}/${pages.length}</span>`;

        // 更新导航按钮
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        
        if (isFirstPage) {
            prevBtn.classList.add('disabled');
            prevBtn.href = '#';
        } else {
            prevBtn.classList.remove('disabled');
            prevBtn.href = `text-learning.html?chapter=${currentChapter}&page=${currentPage - 1}`;
        }
        
        if (isLastPage) {
            // 最后一页显示"完成章节测验"
            nextBtn.textContent = '📋 完成章节测验';
            nextBtn.href = `quiz.html?chapter=${currentChapter}`;
            nextBtn.classList.remove('disabled');
            nextBtn.onclick = null; // 移除之前的onclick
        } else {
            nextBtn.textContent = '下一页 →';
            nextBtn.href = `text-learning.html?chapter=${currentChapter}&page=${currentPage + 1}`;
            nextBtn.classList.remove('disabled');
        }
    }

    // 上一页
    document.getElementById('prevBtn').addEventListener('click', function(e) {
        e.preventDefault();
        if (currentPage > 1) {
            currentPage--;
            window.location.href = `text-learning.html?chapter=${currentChapter}&page=${currentPage}`;
        }
    });

    // 下一页（最后一页时为"完成章节测验"）
    document.getElementById('nextBtn').addEventListener('click', function(e) {
        e.preventDefault();
        const chapter = allChapterData[currentChapter] || allChapterData[1];
        if (currentPage < chapter.pages.length) {
            currentPage++;
            window.location.href = `text-learning.html?chapter=${currentChapter}&page=${currentPage}`;
        } else {
            // 最后一页，跳转到章节测验
            window.location.href = `quiz.html?chapter=${currentChapter}`;
        }
    });

    // 初始化页面
    updatePage();

    // 为内容区域的章节标题添加id，便于导航跳转
    function setupSectionIds() {
        const sections = document.querySelectorAll('#pageContent .section-title');
        sections.forEach((section, index) => {
            section.id = 'section' + (index + 1);
        });
    }
    setupSectionIds();

    // 导航滚动到对应章节
    function scrollToSection(event, index) {
        event.preventDefault();
        // 更新导航active状态
        updateNavActive(index);
        const targetId = 'section' + index;
        const target = document.getElementById(targetId);
        if (target) {
            const offset = 80;
            const top = target.getBoundingClientRect().top + window.pageYOffset - offset;
            window.scrollTo({ top: top, behavior: 'smooth' });
        }
    }

    // 更新导航active状态
    function updateNavActive(index) {
        const navLinks = document.querySelectorAll('#navList a');
        navLinks.forEach((link, i) => {
            if (i === index - 1) {
                link.classList.add('active');
            } else {
                link.classList.remove('active');
            }
        });
    }

    // 监听滚动事件，自动更新导航状态
    function setupScrollSpy() {
        const sections = document.querySelectorAll('#pageContent .section-title');
        const navLinks = document.querySelectorAll('#navList a');

        window.addEventListener('scroll', function() {
            let current = 0;
            sections.forEach((section, index) => {
                const sectionTop = section.getBoundingClientRect().top;
                if (sectionTop <= 150) {
                    current = index;
                }
            });
            updateNavActive(current + 1);
        });
    }
    setupScrollSpy();

    // 讨论区发言功能
    function postTextComment() {
        const input = document.getElementById('textCommentInput');
        if (!input.value.trim()) return;
        const discussionSection = document.querySelector('.discussion-section');
        const newComment = document.createElement('div');
        newComment.className = 'discussion-item';
        newComment.innerHTML = '<div class="author">张同学（你）</div><div class="content">' + input.value + '</div>';
        discussionSection.insertBefore(newComment, discussionSection.querySelector('.post-input-container'));
        input.value = '';
    }
    </script>

="text" id="floatingAIInput" placeholder="输入问题..." style="flex:1;padding:.75rem;border:1px solid #ddd;border-radius:8px;font-size:.85rem;" onkeypress="if(event.key==='Enter')sendFloatingAIMessage()"><button onclick="sendFloatingAIMessage()" style="background:#1a365d;color:white;border:none;border-radius:8px;padding:.75rem 1rem;cursor:pointer;font-size:.85rem;">发送</button></div></div></div>`;document.write(floatingAIHTML);function toggleFloatingAI(){const panel=document.getElementById('floatingAIPanel');const btn=document.getElementById('floatingAIBtn');if(panel.style.display==='none'){panel.style.display='flex';btn.textContent='✕'}else{panel.style.display='none';btn.textContent='🤖'}}</script>
