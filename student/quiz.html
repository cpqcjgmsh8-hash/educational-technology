<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>章节测验 - 教育技术学</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .quiz-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
        }
        .back-btn { position: fixed; top: 1rem; left: 280px; color: var(--text-color); text-decoration: none; font-size: 0.9rem; padding: 0.5rem 1rem; background: var(--hover-bg); border-radius: 8px; transition: all 0.2s; z-index: 100; }
        .back-btn:hover { background: var(--secondary-color); color: white; }
        .quiz-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .chapter-badge {
            display: inline-block;
            background: var(--secondary-color);
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-bottom: 1rem;
        }
        .quiz-progress {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-top: 1rem;
        }
        .progress-bar {
            flex: 1;
            height: 8px;
            background: var(--hover-bg);
            border-radius: 4px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: var(--secondary-color);
            transition: width 0.3s;
        }
        .progress-text {
            font-size: 0.85rem;
            color: var(--text-light);
            white-space: nowrap;
        }
        .question-card {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .question-number {
            display: inline-block;
            background: var(--secondary-color);
            color: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            text-align: center;
            line-height: 28px;
            font-size: 0.85rem;
            margin-right: 0.75rem;
        }
        .question-type {
            display: inline-block;
            background: var(--accent-color);
            color: white;
            padding: 0.125rem 0.5rem;
            border-radius: 4px;
            font-size: 0.7rem;
            margin-left: 0.5rem;
        }
        .question-text {
            font-size: 1.1rem;
            color: var(--text-color);
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }
        .options-list {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .option-item {
            display: flex;
            align-items: center;
            padding: 1rem 1.25rem;
            background: var(--hover-bg);
            border: 2px solid transparent;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .option-item:hover {
            border-color: var(--secondary-color);
            background: rgba(26,54,93,0.05);
        }
        .option-item.selected {
            border-color: var(--secondary-color);
            background: rgba(26,54,93,0.1);
        }
        .option-item.correct {
            border-color: #48bb78;
            background: rgba(72,187,120,0.1);
        }
        .option-item.wrong {
            border-color: #f56565;
            background: rgba(245,101,101,0.1);
        }
        .option-checkbox {
            width: 20px;
            height: 20px;
            border: 2px solid #ddd;
            border-radius: 4px;
            margin-right: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .option-item.selected .option-checkbox {
            border-color: var(--secondary-color);
            background: var(--secondary-color);
        }
        .option-item.selected .option-checkbox::after {
            content: '✓';
            color: white;
            font-size: 0.85rem;
        }
        .option-text {
            font-size: 0.95rem;
            color: var(--text-color);
        }
        .explanation-box {
            margin-top: 1.5rem;
            padding: 1rem;
            background: rgba(26,54,93,0.05);
            border-left: 4px solid var(--secondary-color);
            border-radius: 0 8px 8px 0;
            display: none;
        }
        .explanation-box.show {
            display: block;
        }
        .explanation-title {
            font-weight: bold;
            color: var(--secondary-color);
            margin-bottom: 0.5rem;
        }
        .explanation-text {
            font-size: 0.9rem;
            color: var(--text-color);
            line-height: 1.6;
        }
        .quiz-footer {
            display: flex;
            justify-content: space-between;
            padding: 1.5rem 0;
        }
        .nav-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            background: var(--hover-bg);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            color: var(--text-color);
            text-decoration: none;
            transition: all 0.2s;
        }
        .nav-btn:hover {
            background: var(--secondary-color);
            color: white;
        }
        .result-card {
            background: white;
            border-radius: 12px;
            padding: 2rem;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .result-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        .result-score {
            font-size: 3rem;
            font-weight: bold;
            color: var(--secondary-color);
            margin-bottom: 0.5rem;
        }
        .result-text {
            font-size: 1.1rem;
            color: var(--text-light);
            margin-bottom: 1.5rem;
        }
        .result-detail {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .detail-item {
            padding: 1rem;
            background: var(--hover-bg);
            border-radius: 8px;
        }
        .detail-value {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--secondary-color);
        }
        .detail-label {
            font-size: 0.85rem;
            color: var(--text-light);
        }
        .discussion-section {
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            margin-top: 2rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .discussion-title {
            font-size: 1.1rem;
            color: var(--secondary-color);
            margin-bottom: 1rem;
            padding-bottom: 0.75rem;
            border-bottom: 2px solid var(--hover-bg);
        }
        .discussion-item {
            padding: 1rem;
            background: var(--hover-bg);
            border-radius: 8px;
            margin-bottom: 0.75rem;
        }
        .discussion-item .author {
            font-size: 0.85rem;
            font-weight: bold;
            color: var(--secondary-color);
        }
        .discussion-item .content {
            font-size: 0.9rem;
            color: var(--text-color);
            margin-top: 0.25rem;
        }
        .post-input-container {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }
        .post-input {
            flex: 1;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: inherit;
            resize: none;
        }
    </style>
</head>

            <div class="quiz-container">

                        <div class="progress-bar">

                        <div class="options-list" id="optionsList">
                        </div>
                        <div class="explanation-box" id="explanationBox">
                            <div class="explanation-title">📚 答案解析</div>

                        </div>

                <div class="quiz-footer">
                    <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()">下一题 →</button>

                <div class="discussion-section">

                    </div>

                    </div>
                    <div class="post-input-container">

                        <button class="btn btn-primary" onclick="postQuizComment()">发言</button>
                    </div>
                </div>
            </div>

    <script>
        // 13个章节的测验数据
        const allQuizzes = {
            1: {
                title: "教育技术学导论",
                questions: [
                    {
                        question: "AECT94定义中，教育技术的研究对象是什么？",
                        options: ["教学资源", "学习过程和学习资源", "教学方法", "信息技术"],
                        correct: 1,
                        type: "single",
                        explanation: "AECT94定义明确指出：教育技术是对学习过程和学习资源进行设计、开发、利用、管理和评价的理论和实践。因此研究对象是'学习过程和学习资源'。"
                    },
                    {
                        question: "以下哪项不属于教育技术的五个研究范畴？",
                        options: ["设计", "实施", "利用", "管理"],
                        correct: 1,
                        type: "single",
                        explanation: "教育技术的五个研究范畴是：设计(Design)、开发(Develop)、利用(Utilize)、管理(Manage)、评价(Evaluate)。'实施'不在其中。"
                    },
                    {
                        question: "教育技术的发展历程包括哪些阶段？（多选）",
                        options: ["视觉教育阶段", "听觉教育阶段", "视听教育阶段", "教育技术阶段"],
                        correct: [0, 2, 3],
                        type: "multiple",
                        explanation: "教育技术的发展历程包括：视觉教育阶段(1900-1920)、视听教育阶段(1920-1950)、视听传播阶段(1950-1970)、教育技术阶段(1970至今)。'听觉教育阶段'不是一个独立的阶段。"
                    },
                    {
                        question: "以下哪个不是教育技术的核心方法？",
                        options: ["系统方法", "经验总结法", "教学设计", "绩效技术"],
                        correct: 1,
                        type: "single",
                        explanation: "教育技术的核心方法包括：系统方法、教学设计、绩效技术。经验总结法是传统的研究方法，不属于教育技术的核心方法。"
                    },
                    {
                        question: "在教育技术发展中，哪个阶段开始引入系统方法？",
                        options: ["视觉教育阶段", "视听教育阶段", "视听传播阶段", "教育技术阶段"],
                        correct: 3,
                        type: "single",
                        explanation: "在视听传播阶段(1950-1970)，系统方法被引入教育领域。而到了教育技术阶段(1970至今)，系统方法得到了广泛的应用和发展。"
                    }
                ]
            },
            2: {
                title: "技术背景下的学习",
                questions: [
                    {
                        question: "行为主义学习理论的主要代表人物是谁？",
                        options: ["皮亚杰", "斯金纳", "维果茨基", "布鲁纳"],
                        correct: 1,
                        type: "single",
                        explanation: "斯金纳是行为主义学习理论的主要代表人物，提出了操作性条件反射理论。皮亚杰是认知主义代表，维果茨基是社会建构主义代表。"
                    },
                    {
                        question: "认知主义学习理论强调什么？",
                        options: ["刺激-反应联结", "内在认知过程", "行为习惯形成", "环境强化"],
                        correct: 1,
                        type: "single",
                        explanation: "认知主义学习理论强调学习者的内在认知过程，包括注意、记忆、思维等心理活动，认为学习是信息加工的过程。"
                    },
                    {
                        question: "建构主义学习理论的主要观点包括？（多选）",
                        options: ["知识是主动建构的", "学习需要社会互动", "知识是对现实的客观反映", "情境对学习有重要影响"],
                        correct: [0, 1, 3],
                        type: "multiple",
                        explanation: "建构主义认为：知识是学习者主动建构的；学习需要社会互动和协作；知识不是对现实的客观反映而是动态建构的；情境对学习有重要影响。"
                    },
                    {
                        question: "人本主义学习理论关注什么？",
                        options: ["行为结果", "认知结构", "自我实现", "刺激反应"],
                        correct: 2,
                        type: "single",
                        explanation: "人本主义学习理论关注学习者的自我实现和全面发展，强调学习者的情感、需求和自我价值，与马斯洛、罗杰斯等人相关。"
                    },
                    {
                        question: "混合学习（Blended Learning）结合了哪两种学习方式？",

                        correct: 0,
                        type: "single",
                        explanation: "混合学习结合了线上学习（数字化学习）和线下学习（传统面对面学习）的优势，是一种融合了多种学习方式的学习模式。"
                    }
                ]
            },
            3: {
                title: "学习目标、教学法与技术的关联",
                questions: [
                    {
                        question: "布鲁姆教育目标分类学将教学目标分为哪三个领域？",
                        options: ["知识、情感、动作技能", "认知、情感、心因动作", "认知、情感、心理运动", "知识、态度、技能"],
                        correct: 1,
                        type: "single",
                        explanation: "布鲁姆将教育目标分为认知领域、情感领域和心因动作（心理运动）领域三个维度。"

                    {
                        question: "ADDIE模型包括哪些环节？（多选）",

                    },
                    {
                        question: "形成性评价的主要目的是什么？",

                        type: "single",
                        explanation: "形成性评价是在教学过程中进行的评价，旨在及时发现问题和不足，改进教学过程，促进学习者的持续发展。"
                    },
                    {
                        question: "马杰（Robert Mager）提出的教学目标编写三要素是什么？",

                        explanation: "马杰提出教学目标的编写应包含三个要素：1）行为表现（做什么）；2）行为条件（在什么条件下）；3）行为标准（达到什么程度）。"
                    },
                    {
                        question: "以下哪种教学方法最能体现'以学习者为中心'的理念？",

                        correct: 2,
                        type: "single",
                        explanation: "问题导向学习（PBL）以学习者为中心，通过解决真实问题来建构知识，强调学习者的主动探索和协作学习。"
                    }
                ]
            },
            4: {
                title: "教育技术的系统视角",
                questions: [
                    {
                        question: "系统方法的核心思想是什么？",
                        options: ["整体大于部分之和", "分析还原", "线性因果关系", "单一最优解"],
                        correct: 0,
                        type: "single",
                        explanation: "系统方法的核心思想是整体大于部分之和，强调对系统各组成部分进行整体优化，而非单独优化每个部分。"
                    },
                    {
                        question: "投入-过程-产出模型（IPO模型）描述了什么？",
                        options: ["教学方法", "系统结构", "学习动机", "资源管理"],
                        correct: 1,
                        type: "single",
                        explanation: "IPO模型（投入-过程-产出）是描述系统结构的基本模型，说明系统如何将输入转化为输出的过程。"

                    {
                        question: "在教学系统设计中，反馈的作用是什么？（多选）",

                        type: "multiple",
                        explanation: "反馈在学习中具有重要作用：提供学习信息帮助学习者了解自己的学习状态；调节学习行为使学习更有效；激励学习动机增强学习动力。"

                    {
                        question: "哪个不是教学系统设计的特征？",

                        type: "single",
                        explanation: "教学系统设计具有系统性、计划性、创造性等特征，但并非即时性的——它强调系统的规划和设计过程。"
                    },
                    {
                        question: "影响教学系统设计的关键因素包括？",
                        options: ["学习者特征", "教学目标", "教学资源", "以上都是"],
                        correct: 3,
                        type: "single",
                        explanation: "教学系统设计需要综合考虑学习者特征、教学目标、教学资源等多种因素，进行系统化的分析和设计。"

                        type: "single",
                        explanation: "ARCS模型由Keller提出，'A'代表Attention（注意），即通过唤起学习者的兴趣和好奇心来维持注意。"

        function selectOption(index) {
            if (answered) return;

            const q = questions[currentQuestion];
            const options = document.querySelectorAll('.option-item');

            if (q.type === 'multiple') {
                if (!Array.isArray(answers[currentQuestion])) {
                    answers[currentQuestion] = [];
                }
                const idx = answers[currentQuestion].indexOf(index);
                if (idx > -1) {
                    answers[currentQuestion].splice(idx, 1);
                    options[index].classList.remove('selected');
                } else {
                    answers[currentQuestion].push(index);
                    options[index].classList.add('selected');
                }
            } else {
                answers[currentQuestion] = index;
                options.forEach(opt => opt.classList.remove('selected'));
                options[index].classList.add('selected');
            }

            answered = true;
            showExplanation();
        }

        function showExplanation() {
            const q = questions[currentQuestion];
            document.getElementById('explanationText').textContent = q.explanation;
            document.getElementById('explanationBox').classList.add('show');

            const options = document.querySelectorAll('.option-item');
            if (q.type === 'multiple') {
                q.correct.forEach(c => {
                    options[c].classList.add('correct');
                });
                if (Array.isArray(answers[currentQuestion])) {
                    answers[currentQuestion].forEach(a => {
                        if (!q.correct.includes(a)) {
                            options[a].classList.add('wrong');
                        }
                    });
                }
            } else {
                options[q.correct].classList.add('correct');
                if (answers[currentQuestion] !== q.correct) {
                    options[answers[currentQuestion]].classList.add('wrong');
                }
            }
        }

        function nextQuestion() {
            if (currentQuestion < questions.length - 1) {
                currentQuestion++;
                renderQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            let correct = 0;
            questions.forEach((q, i) => {
                if (q.type === 'multiple') {
                    if (Array.isArray(answers[i]) && answers[i].length === q.correct.length &&
                        answers[i].every(a => q.correct.includes(a))) {
                        correct++;
                    }
                } else if (answers[i] === q.correct) {
                    correct++;
                }
            });

            const score = Math.round(correct / questions.length * 100);
            const isLastChapter = currentChapter >= 13;
            const nextChapter = currentChapter + 1;

            let actionButtons = '';
            if (isLastChapter) {
                // 最后一章，显示返回课程
                actionButtons = `
                    <button class="btn btn-primary" style="margin-right: 1rem;" onclick="retryQuiz()">重新测验</button>
                    <a href="course.html" class="nav-btn">🎓 返回课程</a>
                `;
            } else {
                // 非最后一章，显示进入下一章节
                actionButtons = `
                    <button class="btn btn-primary" style="margin-right: 1rem;" onclick="retryQuiz()">重新测验</button>
                    <a href="video-learning.html?chapter=${nextChapter}" class="nav-btn" style="background: var(--secondary-color); color: white;">➡️ 进入第${nextChapter}章 →</a>
                `;
            }

            document.getElementById('quizContent').innerHTML = `
                <div class="result-card">
                    <div class="result-icon">${score >= 60 ? '🎉' : '📚'}</div>
                    <div class="result-score">${score}分</div>
                    <div class="result-text">${score >= 60 ? '恭喜你通过了测验！' : '继续加油，再试一次吧！'}</div>
                    <div class="result-detail">
                        <div class="detail-item">
                            <div class="detail-value">${correct}</div>
                            <div class="detail-label">正确题数</div>
                        </div>
                        <div class="detail-item">
                            <div class="detail-value">${questions.length - correct}</div>
                            <div class="detail-label">错误题数</div>
                        </div>
                    </div>
                    ${actionButtons}
                </div>
            `;

            document.getElementById('progressFill').style.width = '100%';
            document.getElementById('progressText').textContent = '测验完成';
            document.getElementById('nextBtn').style.display = 'none';
        }

        function retryQuiz() {
            currentQuestion = 0;
            answers = [];
            document.getElementById('nextBtn').style.display = 'block';
            renderQuestion();
        }

        function postQuizComment() {
            const input = document.getElementById('quizCommentInput');
            if (!input.value.trim()) return;

            const discussionSection = document.querySelector('.discussion-section');
            const newComment = document.createElement('div');
            newComment.className = 'discussion-item';
            newComment.innerHTML = '<div class="author">张同学（你）</div><div class="content">' + input.value + '</div>';
            discussionSection.insertBefore(newComment, discussionSection.querySelector('.post-input-container'));
            input.value = '';
        }

        document.addEventListener('DOMContentLoaded', function() {
            renderQuestion();
        });

        try {
            renderQuestion();
        } catch (e) {
            console.error('Error rendering question:', e);
        }
    </script>

="text" id="floatingAIInput" placeholder="输入问题..." style="flex:1;padding:.75rem;border:1px solid #ddd;border-radius:8px;font-size:.85rem;" onkeypress="if(event.key==='Enter') sendFloatingAIMessage()"><button onclick="sendFloatingAIMessage()" style="background:#1a365d;color:white;border:none;border-radius:8px;padding:.75rem 1rem;cursor:pointer;font-size:.85rem;">发送</button></div></div></div>`;document.write(floatingAIHTML);function toggleFloatingAI(){const panel=document.getElementById('floatingAIPanel');const btn=document.getElementById('floatingAIBtn');if(panel.style.display==='none'){panel.style.display='flex';btn.textContent='✕';}else{panel.style.display='none';btn.textContent='🤖';}}let floatingAIFullContent='';function sendFloatingAIMessage(){const input=document.getElementById('floatingAIInput');const message=input.value.trim();if(!message)return;const chatMessages=document.getElementById('floatingAIMessages');const userMsg=document.createElement('div');userMsg.style.cssText='display:flex;gap:.75rem;align-items:flex-start;justify-content:flex-end;';userMsg.innerHTML=`<div style="background:#1a365d;color:white;padding:.75rem;border-radius:8px;border-top-right-radius:2px;max-width:80%;font-size:.85rem;">${message}</div><div style="width:32px;height:32px;background:#1a365d;color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.85rem;flex-shrink:0;">👤</div>`;chatMessages.appendChild(userMsg);const botMsg=document.createElement('div');botMsg.style.cssText='display:flex;gap:.75rem;align-items:flex-start;';botMsg.innerHTML=`<div style="width:32px;height:32px;background:#48bb78;color:white;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0;">📚</div><div style="background:#f7fafc;padding:.75rem;border-radius:8px;border-top-left-radius:2px;max-width:80%;font-size:.85rem;" id="floatingAIResponse"><span class="thinking-dots">正在思考<span>.</span></span></div>`;chatMessages.appendChild(botMsg);chatMessages.scrollTop=chatMessages.scrollHeight;input.value='';let thinkingInterval=setInterval(()=>{const dots=botMsg.querySelector('.thinking-dots');if(dots){const text=dots.textContent;dots.innerHTML=text.endsWith('...')?'正在思考':text+'.';}},500);const responseText=botMsg.querySelector('#floatingAIResponse');floatingAIFullContent='';fetch('http://localhost:8000/api/chat/stream',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({userId:'student_001',message:message})}).then(response=>{if(!response.ok)throw new Error('API请求失败');const reader=response.body.getReader();const decoder=new TextDecoder();function read(){reader.read().then(({done,value})=>{if(done){clearInterval(thinkingInterval);return;}const chunk=decoder.decode(value,{stream:true});const lines=chunk.split('\n');for(const line of lines){if(line.startsWith('data:')){try{const data=JSON.parse(line.slice(5));if(data.content){clearInterval(thinkingInterval);floatingAIFullContent+=data.content;responseText.innerHTML=`<div style="white-space:pre-wrap;">${floatingAIFullContent}<span class="cursor">|</span></div>`;chatMessages.scrollTop=chatMessages.scrollHeight;}if(data.done){responseText.innerHTML=`<div style="white-space:pre-wrap;">${floatingAIFullContent}</div>`;chatMessages.scrollTop=chatMessages.scrollHeight;}if(data.error){clearInterval(thinkingInterval);responseText.innerHTML=`抱歉出现问题: ${data.error}`;}}catch(e){}}}if(!done)read();});}read();}).catch(error=>{clearInterval(thinkingInterval);responseText.innerHTML=`连接失败: ${error.message}`;});}</script>
